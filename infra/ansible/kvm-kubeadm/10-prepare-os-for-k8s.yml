---
- name: Prepare Ubuntu OS layer for Kubernetes
  hosts: k8s
  become: true
  gather_facts: true

  vars:
    k8s_hosts_block: |
      192.168.122.101 k8s-cp-01
      192.168.122.102 k8s-worker-01
      192.168.122.103 k8s-worker-02

  tasks:
    - name: Show node identity
      ansible.builtin.debug:
        msg: "Preparing {{ inventory_hostname }} at {{ ansible_host }}"

    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Disable swap persistently in /etc/fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\s+swap\s+.*)$'
        replace: '# \1'

    - name: Configure kernel modules for Kubernetes networking
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          overlay
          br_netfilter

    - name: Load overlay module
      ansible.builtin.command: modprobe overlay
      changed_when: false

    - name: Load br_netfilter module
      ansible.builtin.command: modprobe br_netfilter
      changed_when: false

    - name: Configure sysctl for Kubernetes networking
      ansible.builtin.copy:
        dest: /etc/sysctl.d/k8s.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1

    - name: Apply sysctl settings
      ansible.builtin.command: sysctl --system
      changed_when: false

    - name: Add Kubernetes node names to /etc/hosts
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED K8S HOSTS"
        block: "{{ k8s_hosts_block }}"

    - name: Install useful base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gpg
          - apt-transport-https
          - dnsutils
          - vim
          - htop
          - net-tools
        state: present
        update_cache: true
