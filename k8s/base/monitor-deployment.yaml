apiVersion: apps/v1
kind: Deployment
metadata:
  name: solana-monitor
  labels:
    app.kubernetes.io/name: solana-containerised-testbed
    app.kubernetes.io/component: monitor
    app.kubernetes.io/part-of: solana-containerised-testbed
    testbed.solana/stage: observability-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: solana-containerised-testbed
      app.kubernetes.io/component: monitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: solana-containerised-testbed
        app.kubernetes.io/component: monitor
        app.kubernetes.io/part-of: solana-containerised-testbed
        testbed.solana/stage: observability-core
    spec:
      containers:
        - name: monitor
          image: docker.io/khoshaba/solana-latency-monitor:v0.2.0
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /app/configs/config.k8s.yaml
          ports:
            - name: metrics
              containerPort: 9464
          volumeMounts:
            - name: monitor-config
              mountPath: /app/configs/config.k8s.yaml
              subPath: config.k8s.yaml
              readOnly: true
            - name: monitor-output
              mountPath: /app/output
          startupProbe:
            httpGet:
              path: /metrics
              port: metrics
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            failureThreshold: 6
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            failureThreshold: 6
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: monitor-config
          configMap:
            name: monitor-config
        - name: monitor-output
          emptyDir: {}
