apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: solana-validator
  labels:
    app.kubernetes.io/name: solana-containerised-testbed
    app.kubernetes.io/component: validator
    app.kubernetes.io/part-of: solana-containerised-testbed
    testbed.solana/stage: observability-core
spec:
  serviceName: solana-validator-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: solana-containerised-testbed
      app.kubernetes.io/component: validator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: solana-containerised-testbed
        app.kubernetes.io/component: validator
        app.kubernetes.io/part-of: solana-containerised-testbed
        testbed.solana/stage: observability-core
    spec:
      containers:
        - name: validator
          image: docker.io/khoshaba/solana-localnet-validator:v1.18.25-noavx2-ivybridge-yellowstone
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: validator-config
          ports:
            - name: rpc
              containerPort: 8899
            - name: geyser-grpc
              containerPort: 10000
          volumeMounts:
            - name: validator-ledger
              mountPath: /var/lib/solana/ledger
            - name: validator-geyser-config
              mountPath: /etc/solana/yellowstone-geyser.json
              subPath: yellowstone-geyser.json
              readOnly: true
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - solana --url http://127.0.0.1:8899 cluster-version >/dev/null 2>&1
            failureThreshold: 60
            periodSeconds: 5
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - solana --url http://127.0.0.1:8899 cluster-version >/dev/null 2>&1
            failureThreshold: 6
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - solana --url http://127.0.0.1:8899 cluster-version >/dev/null 2>&1
            failureThreshold: 6
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "6"
              memory: "12Gi"
      volumes:
        - name: validator-ledger
          persistentVolumeClaim:
            claimName: validator-ledger-pvc
        - name: validator-geyser-config
          configMap:
            name: validator-geyser-config
