apiVersion: batch/v1
kind: Job
metadata:
  name: wallet-init
  labels:
    app.kubernetes.io/name: solana-containerised-testbed
    app.kubernetes.io/component: wallet-init
    app.kubernetes.io/part-of: solana-containerised-testbed
    testbed.solana/stage: observability-core
spec:
  backoffLimit: 12
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: solana-containerised-testbed
        app.kubernetes.io/component: wallet-init
        app.kubernetes.io/part-of: solana-containerised-testbed
        testbed.solana/stage: observability-core
    spec:
      restartPolicy: OnFailure
      containers:
        - name: wallet-init
          image: docker.io/khoshaba/solana-wallet-init:v1.18.25-noavx2-ivybridge
          imagePullPolicy: IfNotPresent
          env:
            - name: SOLANA_URL
              value: "http://solana-rpc:8899"
            - name: PAYER
              value: "6avCzMrjUDebRYtSoQ6GPQENjoxDaD2Udik8JzRnKbtb"
            - name: AIRDROP_SOL
              value: "10000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
