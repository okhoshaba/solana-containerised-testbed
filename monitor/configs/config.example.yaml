# Example configuration: defines gRPC/RPC endpoints and monitoring interval
#rpc: https://api.mainnet-beta.solana.com
#grpc: solana-yellowstone-grpc.publicnode.com:443
rpc: http://127.0.0.1:8899
interval: 5s
log_level: info

metrics:
  prometheus_port: 9464

filters:
  accounts:
    - "" # Empty value means no filtering; replace with target account public keys if needed.

reconnect:
  retries: -1 # -1 means reconnect indefinitely
  backoff: 2s
