apiVersion: batch/v1
kind: Job
metadata:
  name: m1-v0-8-0-m1-s32-128
  namespace: solana-observability
  labels:
    app.kubernetes.io/name: m1-v0-8-0-m1-s32-128
    app.kubernetes.io/component: v080-m1-step-response
    app.kubernetes.io/part-of: solana-containerised-testbed
    solana-testbed-run-id: v0.8.0-M1-S32-128
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: m1-v0-8-0-m1-s32-128
        app.kubernetes.io/component: v080-m1-step-response
        app.kubernetes.io/part-of: solana-containerised-testbed
        solana-testbed-run-id: v0.8.0-M1-S32-128
    spec:
      restartPolicy: Never
      nodeSelector:
        testbed-role: observability
      containers:
      - name: tools
        image: docker.io/khoshaba/solana-controlled-load-tools:layer1
        imagePullPolicy: IfNotPresent
        command:
        - bash
        - -lc
        - |
          set -euo pipefail
          mkdir -p /work/results
          python3 /work/scripts/collect_csv.py \
            --loadgen-url "http://solana-loadgen2:7070" \
            --prom-url "http://solana-metrics:9464" \
            --rate-key "lambda" \
            --sample "5" \
            --timeout "810" \
            step \
            --levels "32 128" \
            --hold "300" \
            --warmup "30" \
            | tee /work/results/collect_csv.csv
        volumeMounts:
        - name: results
          mountPath: /work/results
      volumes:
      - name: results
        emptyDir: {}
