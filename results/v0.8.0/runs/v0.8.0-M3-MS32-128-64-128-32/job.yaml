apiVersion: batch/v1
kind: Job
metadata:
  name: m3-v0-8-0-m3-ms32-128-64-128-32
  namespace: solana-observability
  labels:
    app.kubernetes.io/name: solana-controlled-load-m3
    testbed.stage: v0.8.0
    testbed.run_id: v0.8.0-M3-MS32-128-64-128-32
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: solana-controlled-load-m3
        testbed.stage: v0.8.0
        testbed.run_id: v0.8.0-M3-MS32-128-64-128-32
    spec:
      restartPolicy: Never
      containers:
        - name: collect
          image: docker.io/khoshaba/solana-controlled-load-tools:layer1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              mkdir -p /work/results
              python3 /work/scripts/collect_csv.py                 --loadgen-url http://solana-loadgen2:7070                 --prom-url http://solana-metrics:9464                 --rate-key lambda                 --sample 5                 --timeout 5                 step                 --levels '32 128 64 128 32'                 --hold 180                 --warmup 30                 | tee /work/results/collect_csv.csv
